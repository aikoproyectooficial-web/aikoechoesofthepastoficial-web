<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Aiko Card Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="pantalla-inicio" style="position: fixed; top:0; left:0; width:100%; height:100%; background: radial-gradient(circle, #2c3e50, #000); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; color: white; text-align: center;">
    <h1 style="font-size: 4em; color: #f39c12; text-shadow: 0 0 20px #d35400; margin-bottom: 10px;">AIKO CARD GAME</h1>
    <p style="font-size: 1.2em; margin-bottom: 30px; color: #bdc3c7;">Domina las facciones y conquista el tablero</p>
    
    <div id="menu-botones" style="display: flex; flex-direction: column; gap: 15px;">
        <button onclick="iniciarJuego()" style="padding: 15px 50px; font-size: 1.5em; cursor: pointer; background: #27ae60; color: white; border: none; border-radius: 5px; box-shadow: 0 5px 0 #1e8449; transition: 0.2s;">JUGAR</button>
        <button onclick="mostrarCreditos()" style="padding: 10px 30px; font-size: 1em; cursor: pointer; background: #2980b9; color: white; border: none; border-radius: 5px;">CÓMO JUGAR</button>
    </div>
</div>
<div id="modal-suerte" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; color: white;">
    <h2>¡Duelo de Suerte!</h2>
    <p>Gana al Yan-Ken-Po para decidir quién empieza</p>
    <div id="opciones-suerte">
        <button onclick="jugarSuerte('piedra')" style="padding: 20px; margin: 10px; cursor: pointer;">🪨 Piedra</button>
        <button onclick="jugarSuerte('papel')" style="padding: 20px; margin: 10px; cursor: pointer;">📄 Papel</button>
        <button onclick="jugarSuerte('tijera')" style="padding: 20px; margin: 10px; cursor: pointer;">✂️ Tijera</button>
    </div>
    <div id="resultado-suerte" style="margin-top: 20px; font-size: 1.5em;"></div>
</div>
<div id="mazo-contenedor">
    <div id="deck" class="deck-visual">
        <span id="cartas-restantes">10</span>
    </div>
</div>
<div id="contenedor-mana">
    <h2>Maná: <span id="mana-display">1 / 1</span></h2>
    <button id="btn-terminar" onclick="terminarTurno()">Terminar Turno</button>
</div>
    <div id="tablero">
        <div id="heroe-oponente" class="heroe">
            <div class="vida-heroe" id="vida-enemiga">30</div>
        </div>

        <div id="heroe-jugador" class="heroe">
            <div class="vida-heroe" id="vida-jugador">30</div>
        </div>
        <div id="campo-oponente" class="campo"></div>
        
        <hr>

        <div id="campo-jugador" class="campo"></div>

        <div id="mano-jugador" class="mano"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
